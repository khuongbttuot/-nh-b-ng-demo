<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện ảnh của Khương</title>
    <style>
        /* CHUYỂN SANG MÀU TỐI */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #121212; /* Màu nền đen nhám */
            color: #ffffff; /* Màu chữ trắng */
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { color: #f0f0f0; margin-bottom: 30px; }
        
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        
        /* Chỉnh khung chứa ảnh để đặt số lên trên */
        .image-container {
            position: relative;
            width: 300px;
        }
        
        .image-container img { 
            width: 100%; 
            height: auto; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(255,255,255,0.05); 
            transition: transform 0.3s ease;
            display: block;
        }
        
        .image-container img:hover {
            transform: scale(1.05);
        }
        
        /* SỐ HIỂN THỊ TRÊN ẢNH */
        .image-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #00ffcc; /* Màu số xanh neon cho nổi bật */
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            border: 1px solid #00ffcc;
        }
    </style>
</head>
<body>

    <h1>Thư viện ảnh Demo (Dark Mode)</h1>

    <div class="gallery" id="gallery-container">
        <!-- Ảnh sẽ tự động được thêm vào đây bằng Javascript -->
    </div>

    <script>
        const gallery = document.getElementById('gallery-container');
        
        // Vòng lặp tự động quét từ ảnh 1.png đến 40.png (có thể tăng số 40 lên nếu bạn có nhiều ảnh hơn)
        for (let i = 1; i <= 40; i++) {
            const div = document.createElement('div');
            div.className = 'image-container';
            
            const img = document.createElement('img');
            img.src = i + '.png';
            img.alt = 'Ảnh ' + i;
            
            // GIẢM LAG: Kỹ thuật Lazy loading chỉ tải ảnh khi người dùng cuộn chuột tới
            img.loading = 'lazy'; 
            
            // TỰ ĐỘNG LỌC ẢNH LỖI: Nếu ảnh số đó không tồn tại (ví dụ bị nhảy số), web sẽ tự ẩn khung đó đi
            img.onerror = function() {
                this.parentElement.style.display = 'none';
            };

            const numberSpan = document.createElement('span');
            numberSpan.className = 'image-number';
            numberSpan.innerText = i; // Đặt số của tên ảnh

            div.appendChild(img);
            div.appendChild(numberSpan);
            gallery.appendChild(div);
        }
    </script>
</body>
</html>
