<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện ảnh của Khương</title>
    <style>
        /* --- Giao diện tối màu (Dark Mode) & Giảm lag --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            user-select: none; /* Ngăn bôi đen văn bản khi click nhanh */
        }
        h1 { color: #ffffff; margin-bottom: 30px; font-weight: 300; }
        
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding-bottom: 50px;
        }
        
        /* --- Khung chứa ảnh & Số thứ tự --- */
        .image-container {
            position: relative;
            width: 300px;
            cursor: pointer; /* Hiển thị con trỏ tay khi di chuột vào */
            overflow: hidden;
            border-radius: 12px;
            transition: box-shadow 0.3s ease;
        }
        
        .image-container:hover {
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.2); /* Hiệu ứng đổ bóng màu xanh khi hover */
        }
        
        .image-container img { 
            width: 100%; 
            height: auto; 
            display: block;
            transition: transform 0.5s ease;
        }
        
        /* Hiệu ứng phóng to nhẹ ảnh khi di chuột vào */
        .image-container:hover img {
            transform: scale(1.08);
        }
        
        /* --- Số thứ tự trên ảnh --- */
        .image-number {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #00ffcc; /* Màu xanh neon */
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none; /* Không nhận sự kiện click */
            border: 1px solid rgba(0, 255, 204, 0.3);
            z-index: 10;
        }

        /* =========================================================
           --- CSS cho Khung xem ảnh lớn (Lightbox Overlay) ---
           ========================================================= */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* Nền đen mờ */
            display: none; /* Mặc định ẩn */
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Hiển thị trên cùng */
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Khi lightbox được mở */
        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .lightbox-image {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        /* Hiệu ứng phóng to khi ảnh lớn xuất hiện */
        .lightbox-overlay.active .lightbox-image {
            transform: scale(1);
        }
        
        /* Nút đóng (X) */
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffffff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .close-lightbox:hover {
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <h1>Thư viện ảnh Bảng xếp hạng</h1>

    <div class="gallery" id="gallery-container">
        <!-- Ảnh sẽ được tự động thêm vào đây bằng JavaScript -->
    </div>

    <!-- Khung xem ảnh lớn (Lightbox) -->
    <div class="lightbox-overlay" id="lightbox">
        <span class="close-lightbox" id="close-btn">&times;</span>
        <img src="" alt="Ảnh lớn" class="lightbox-image" id="lightbox-img">
    </div>

    <script>
        const gallery = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');
        
        // --- 1. Tự động tạo thư viện ảnh (từ 1.png đến 40.png) ---
        for (let i = 1; i <= 40; i++) {
            const div = document.createElement('div');
            div.className = 'image-container';
            
            // Thiết lập sự kiện click để mở ảnh lớn
            div.onclick = function() {
                openLightbox(i + '.png');
            };
            
            const img = document.createElement('img');
            img.src = i + '.png';
            img.alt = 'Bảng ' + i;
            img.loading = 'lazy'; // Giảm lag: chỉ tải khi cuộn tới
            
            // Tự động ẩn khung nếu ảnh không tồn tại
            img.onerror = function() {
                this.parentElement.style.display = 'none';
            };

            const numberSpan = document.createElement('span');
            numberSpan.className = 'image-number';
            numberSpan.innerText = i; // Số thứ tự

            div.appendChild(img);
            div.appendChild(numberSpan);
            gallery.appendChild(div);
        }
        
        // --- 2. Xử lý logic Lightbox (Xem ảnh lớn) ---
        
        function openLightbox(imageSrc) {
            lightboxImg.src = imageSrc; // Gán nguồn ảnh lớn
            lightbox.classList.add('active'); // Hiển thị lightbox
            document.body.style.overflow = 'hidden'; // Ngăn cuộn trang nền
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active'); // Ẩn lightbox
            document.body.style.overflow = ''; // Cho phép cuộn trang lại
            // Xóa src sau khi đóng để tránh hiện ảnh cũ khi mở ảnh mới
            setTimeout(() => { lightboxImg.src = ''; }, 300);
        }
        
        // Đóng khi click vào nút X
        closeBtn.onclick = closeLightbox;
        
        // Đóng khi click ra ngoài vùng ảnh lớn
        lightbox.onclick = function(e) {
            if (e.target !== lightboxImg) {
                closeLightbox();
            }
        };
        
        // Đóng khi nhấn phím ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
