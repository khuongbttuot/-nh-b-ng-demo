<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện bảng xếp hạng bot tính điểm EM DỪA</title>
    <style>
        /* --- GIAO DIỆN TỐI MÀU (DARK MODE) --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            user-select: none; 
        }
        h1 { color: #ffffff; margin-bottom: 30px; font-weight: 300; }
        
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding-bottom: 50px;
        }
        
        /* --- KHUNG CHỨA ẢNH & TỐI ƯU TỐC ĐỘ (CSS) --- */
        .image-container {
            position: relative;
            width: 300px;
            cursor: pointer; 
            overflow: hidden;
            border-radius: 12px;
            transition: box-shadow 0.3s ease;
            
            /* Tăng tốc độ render web cực mạnh */
            content-visibility: auto; 
            contain-intrinsic-size: 300px 170px; /* Kích thước dự kiến giữ chỗ */
        }
        
        .image-container:hover {
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.2); 
        }
        
        .image-container img { 
            width: 100%; 
            height: auto; 
            display: block;
            transition: transform 0.5s ease;
            background-color: #1e1e1e; /* Màu nền chờ load ảnh */
        }
        
        .image-container:hover img {
            transform: scale(1.08);
        }
        
        /* --- SỐ THỨ TỰ --- */
        .image-number {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #00ffcc; 
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none; 
            border: 1px solid rgba(0, 255, 204, 0.3);
            z-index: 10;
        }

        /* --- KHUNG XEM ẢNH LỚN (LIGHTBOX) --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000; 
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .lightbox-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .lightbox-image {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        
        .lightbox-overlay.active .lightbox-image {
            transform: scale(1);
        }
        
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffffff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .close-lightbox:hover {
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <!-- ĐÃ ĐỔI TÊN TIÊU ĐỀ THEO YÊU CẦU -->
    <h1>Thư viện bảng xếp hạng bot tính điểm EM DỪA</h1>

    <div class="gallery" id="gallery-container">
        <!-- Javascript sẽ xử lý việc nhét ảnh vào đây -->
    </div>

    <!-- KHUNG LIGHTBOX -->
    <div class="lightbox-overlay" id="lightbox">
        <span class="close-lightbox" id="close-btn">&times;</span>
        <img src="" alt="Ảnh lớn" class="lightbox-image" id="lightbox-img">
    </div>

    <script>
        const gallery = document.getElementById('gallery-container');
        const fragment = document.createDocumentFragment(); // TỐI ƯU JS: Đóng gói thẻ để ném ra web 1 lần duy nhất
        
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');
        
        // Vòng lặp nâng lên quét 200 ảnh thoải mái
        for (let i = 1; i <= 200; i++) {
            const div = document.createElement('div');
            div.className = 'image-container';
            
            div.onclick = function() {
                openLightbox(i + '.png');
            };
            
            const img = document.createElement('img');
            img.src = i + '.png';
            img.alt = 'Bảng ' + i;
            
            // --- CÁC THÔNG SỐ TĂNG TỐC LOAD ẢNH BÀN THỜ ---
            img.loading = 'lazy'; // Chỉ tải khi cuộn tới
            img.decoding = 'async'; // Tránh làm đơ trang khi xử lý ảnh nặng
            
            // Ẩn mượt mà các ảnh bị thiếu
            img.onerror = function() {
                this.parentElement.style.display = 'none';
            };

            const numberSpan = document.createElement('span');
            numberSpan.className = 'image-number';
            numberSpan.innerText = i; 

            div.appendChild(img);
            div.appendChild(numberSpan);
            
            fragment.appendChild(div); // Nhét tạm vào hộp
        }
        
        // Đổ toàn bộ hộp ra giao diện (nhanh gấp nhiều lần nhét lẻ tẻ)
        gallery.appendChild(fragment);
        
        // --- XỬ LÝ ĐÓNG/MỞ ẢNH LỚN ---
        function openLightbox(imageSrc) {
            lightboxImg.src = imageSrc; 
            lightbox.classList.add('active'); 
            document.body.style.overflow = 'hidden'; 
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active'); 
            document.body.style.overflow = ''; 
            setTimeout(() => { lightboxImg.src = ''; }, 300);
        }
        
        closeBtn.onclick = closeLightbox;
        
        lightbox.onclick = function(e) {
            if (e.target !== lightboxImg) {
                closeLightbox();
            }
        };
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
